# QueryGate — one-command local bring-up of the WHOLE demo (spec §8).
#
#   cp .env.example .env        # (first time only — set the Azure key for the live /api/ask answers)
#   docker compose up --build   # Postgres + Layer-3 role + seed + the live web demo on :8000
#
# Then open http://localhost:8000 for the web demo, or talk MCP/CLI to the read-only role.
#
# Services:
#   * db     — Postgres 16. On first init it runs scripts/schema.sql then the Layer-3 role/grants
#              (docker-init-role.sh -> init_role.sql). The read-only `querygate` role is created here.
#   * seeder — the querygate image, run once as the ADMIN role to load the deterministic seed, then exits.
#   * web    — the querygate image running `querygate web`: the static app/ UI + the live /api/* agent
#              loop, connecting as the READ-ONLY role. Published on 127.0.0.1 only (loopback — §19).
#
# Re-running `docker compose up` re-seeds (idempotent) without dropping the role or its grants.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-querygate_admin}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-admin_pw}"
      POSTGRES_DB: "${POSTGRES_DB:-querygate}"
      QUERYGATE_DB_PASSWORD: "${QUERYGATE_DB_PASSWORD:-querygate_pw}"
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5432}:5432"
    volumes:
      - querygate-pgdata:/var/lib/postgresql/data
      # initdb hooks run alphabetically, once, on an empty data dir:
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./scripts/docker-init-role.sh:/docker-entrypoint-initdb.d/02-init-role.sh:ro
      - ./scripts/init_role.sql:/init/init_role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot data loader: runs the deterministic seed as the admin role through the app's own CLI
  # (`querygate seed --reset`), then exits. Idempotent (truncate-and-reload).
  seeder:
    build: .
    image: querygate:local
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-querygate_admin}:${POSTGRES_PASSWORD:-admin_pw}@db:5432/${POSTGRES_DB:-querygate}"
    command: ["querygate", "seed", "--reset"]
    restart: "no"

  # The live web demo: the static app/ UI + the real agent loop (/api/ask) over the read-only boundary.
  web:
    build: .
    image: querygate:local
    depends_on:
      seeder:
        condition: service_completed_successfully
    # Pull the Azure model key (for the live /api/ask answers) from .env if present; the DB URLs below
    # always override the localhost ones in .env so they resolve to the `db` service inside the network.
    env_file:
      - path: .env
        required: false
    environment:
      # The server connects as the READ-ONLY role (the whole Layer-3 story). Never the admin URL.
      QUERYGATE_DATABASE_URL: "postgresql://querygate:${QUERYGATE_DB_PASSWORD:-querygate_pw}@db:5432/${POSTGRES_DB:-querygate}"
      QUERYGATE_AUDIT_PATH: "/data/audit.jsonl"
      # Inside the container the server must bind 0.0.0.0 for Docker port mapping to reach it; the
      # published port below is pinned to 127.0.0.1 so the host-side exposure stays loopback-only.
      QUERYGATE_WEB_HOST: "0.0.0.0"
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-8000}:8000"
    command: ["querygate", "web", "--port", "8000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/eval > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  querygate-pgdata:
